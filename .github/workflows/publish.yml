name: Publish to PyPI

# Zero-token release: push a tag like v0.3.0 and this builds + publishes
# via PyPI Trusted Publishing (OIDC). No API token is stored anywhere.
#
# One-time setup on PyPI (Account -> Publishing -> Add a pending publisher):
#   PyPI project name : nano-empire-tollbooth
#   Owner             : roblambert9
#   Repository        : nano-empire-tollbooth
#   Workflow filename : publish.yml
#   Environment       : pypi
# After that, every `git push origin vX.Y.Z` publishes automatically.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
